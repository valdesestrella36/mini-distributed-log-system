name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r broker/requirements-dev.txt

      - name: Run Python tests
        run: |
          pytest -q broker/tests

  c-client:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Build C client
        run: |
          make -C clients/c_client

      - name: Smoke run C client (help)
        run: |
          ./clients/c_client/c_client --help || true
